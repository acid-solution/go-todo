<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Todo List</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page">
    <h1>Go Todo List</h1>

    <div id="statusMessage" class="status-message hidden"></div>

    <section id="authPanel" class="auth-panel">
      <form id="loginForm" class="auth-card">
        <h2>登录</h2>

        <label>
          用户名
          <input
            id="loginUsername"
            type="text"
            autocomplete="username"
            required
          />
        </label>

        <label>
          密码
          <input
            id="loginPassword"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>

        <button id="loginBtn" type="submit">登录</button>
      </form>

      <form id="registerForm" class="auth-card">
        <h2>注册</h2>

        <label>
          用户名
          <input
            id="registerUsername"
            type="text"
            autocomplete="username"
            required
          />
        </label>

        <label>
          密码
          <input
            id="registerPassword"
            type="password"
            autocomplete="new-password"
            required
          />
        </label>

        <button id="registerBtn" type="submit">注册</button>
      </form>
    </section>

    <section id="appPanel" class="hidden">
      <header class="user-bar">
        <span>
          当前用户：
          <strong id="currentUsername"></strong>
        </span>

        <button id="logoutBtn" type="button">退出登录</button>
      </header>

      <form id="createForm" class="create-panel">
        <input
          id="titleInput"
          type="text"
          placeholder="任务名称"
          required
        />

        <input
          id="descInput"
          type="text"
          placeholder="任务描述"
        />

        <button id="createBtn" type="submit">创建</button>
      </form>

      <section class="filter-panel">
        <select id="completedFilter">
          <option value="">全部</option>
          <option value="false">未完成</option>
          <option value="true">已完成</option>
        </select>

        <select id="pageSizeSelect">
          <option value="5">每页 5 条</option>
          <option value="10" selected>每页 10 条</option>
          <option value="20">每页 20 条</option>
        </select>

        <button id="prevPageBtn" type="button">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextPageBtn" type="button">下一页</button>
      </section>

      <section id="todoList" class="todo-list"></section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>

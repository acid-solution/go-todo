<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go语言入门级项目 Todo List</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="page">
    <h1>Go语言入门级项目 Todo List</h1>

    <section class="create-panel">
      <input id="titleInput" type="text" placeholder="任务名称" />
      <input id="descInput" type="text" placeholder="任务描述" />
      <button id="createBtn">创建</button>
    </section>

    <section class="filter-panel">
      <select id="completedFilter">
        <option value="">全部</option>
        <option value="false">未完成</option>
        <option value="true">已完成</option>
      </select>

      <select id="pageSizeSelect">
        <option value="5">每页 5 条</option>
        <option value="10" selected>每页 10 条</option>
        <option value="20">每页 20 条</option>
      </select>

      <button id="prevPageBtn">上一页</button>
      <span id="pageInfo">第 1 页</span>
      <button id="nextPageBtn">下一页</button>
    </section>

    <section id="todoList" class="todo-list"></section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
